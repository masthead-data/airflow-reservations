name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          make setup
      - name: Run tests
        run: |
          make test
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit

  e2e:
    # Run on main branch/tag pushes and PRs from the same repo (includes Dependabot)
    # Skip for PRs from forks due to workload identity security restrictions
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        airflow-version: ['2', '3']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          make setup
      - id: auth
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093'  # v3
        with:
          workload_identity_provider: 'projects/431544431936/locations/global/workloadIdentityPools/github/providers/github-ci'
          service_account: 'github-ci-deployer@masthead-prod.iam.gserviceaccount.com'
          create_credentials_file: true
      - name: Set up GCP credentials for Docker
        run: |
          # Create gcloud config directory
          mkdir -p $HOME/.config/gcloud
          # Move credentials instead of copying to remove them from the workspace
          # This avoids "Permission denied" errors when Docker tries to copy the workspace
          mv ${{ steps.auth.outputs.credentials_file_path }} $HOME/.config/gcloud/application_default_credentials.json
          # Ensure credentials are readable by the Docker container's user (uid 50000)
          chmod 644 $HOME/.config/gcloud/application_default_credentials.json
          # Fix permissions for the workspace so Docker user can read source code
          chmod -R a+rX .
      - name: Run E2E tests (Airflow ${{ matrix.airflow-version }}.x)
        run: |
          ./tests/e2e/run_e2e_test.sh --version ${{ matrix.airflow-version }}

  dependabot:
    name: Dependabot auto-merge
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'masthead-data/airflow-reservations'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for Dependabot PRs
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test, e2e]
    permissions:
      contents: write
      id-token: write  # Required for trusted publishing to PyPI and Sigstore attestations
      attestations: write  # Required for Sigstore PEP 740 attestations
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          make install-dev

      - name: Build package
        run: make build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          attestations: true

      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --of JSON -o dist/sbom.cyclonedx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
